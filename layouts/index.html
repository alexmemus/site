{{ define "main" }}
  {{ .Content }}
  {{ $posts := where site.RegularPages "Section" "posts" }}
  {{ if $posts }}
  <div class="post-list">
    {{ range sort $posts "Date" "desc" }}
    <div>
      <span class="post-date">{{ .Date.Format "2006" }}</span>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </div>
    {{ end }}
  </div>
  {{ end }}
{{ end }}
